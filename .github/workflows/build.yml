name: Coinly Api CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - staging

env:
  DOTNET_VERSION: "10.x"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # gerardogarnica/aurora-coinly-api

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "Aurora Coinly.slnx"

      - name: Build
        run: dotnet build "Aurora Coinly.slnx" --configuration Release --no-restore

      - name: Test
        run: dotnet test "Aurora Coinly.slnx" --configuration Release --no-restore --no-build --verbosity normal

  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write

    outputs:
      env_name: ${{ steps.env.outputs.env_name }}

    steps:
      - uses: actions/checkout@v5

      - name: Resolve environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env_name=production" >> $GITHUB_OUTPUT
          else
            echo "env_name=staging" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Aurora.Coinly.Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.env_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to Dokploy
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Trigger Dokploy webhook
        env:
          WEBHOOK_PROD: ${{ secrets.DOKPLOY_WEBHOOK_PROD }}
          WEBHOOK_STAGING: ${{ secrets.DOKPLOY_WEBHOOK_STAGING }}
        run: |
          if [[ "${{ needs.docker-build-push.outputs.env_name }}" == "production" ]]; then
            WEBHOOK="$WEBHOOK_PROD"
          else
            WEBHOOK="$WEBHOOK_STAGING"
          fi

          if [[ -z "$WEBHOOK" ]]; then
            echo "⚠️ Webhook no configurado aún — imagen publicada en GHCR, deploy omitido."
            exit 0
          fi

          curl -fsS --retry 3 --retry-delay 5 --retry-all-errors --max-time 30 -X POST "$WEBHOOK"
          echo "✅ Deploy disparado en Dokploy (${{ needs.docker-build-push.outputs.env_name }})"
